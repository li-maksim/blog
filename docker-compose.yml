# version: '3.8'

services:
  blog:
    build: .
    ports:
      - "9000:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: blog_db
      DB_USER: blog_user
      DB_PASSWORD: password
    env_file: 
      - .env
    depends_on:
      - db
    networks:
      - blog-network

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_password
      MYSQL_DATABASE: blog_db
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  db_data:

networks:
  blog-network:
    driver: bridge